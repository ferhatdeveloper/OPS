name: data_sync_module
description: A new Flutter package for data synchronization between Supabase and SQLite.
version: 0.0.1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  supabase_flutter: ^2.0.0
  uuid: ^4.0.0
  crypto: ^3.0.0
  rxdart: ^0.27.7
  connectivity_plus: ^6.0.0
  json_annotation: ^4.8.1
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
